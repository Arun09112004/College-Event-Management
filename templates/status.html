<!DOCTYPE html>
<html>
<head>
<title>Check Registration Status</title>

<style>

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    width:500px;
    margin:100px auto;
    background:white;
    color:black;
    padding:40px;
    border-radius:20px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    background:#1e3c72;
    color:white;
    border:none;
    border-radius:8px;
}

.status{
    margin-top:25px;
    font-size:24px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Check Registration Status</h1>

<form method="POST">

{% csrf_token %}

<input type="email"
       name="email"
       placeholder="Enter Registered Email"
       required>

<button type="submit">
Check Status
</button>

</form>

{% if status %}
<div class="status">
Status : {{ status }}
</div>
{% endif %}

</div>

</body>
</html>
